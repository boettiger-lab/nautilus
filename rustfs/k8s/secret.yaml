# DO NOT commit real credentials. This file shows the structure only.
# Create the secret with:
#
#   kubectl -n biodiversity create secret generic rustfs-credentials \
#     --from-literal=RUSTFS_ACCESS_KEY=$(openssl rand -hex 12) \
#     --from-literal=RUSTFS_SECRET_KEY=$(openssl rand -hex 24)
#
# Record the generated values somewhere safe (e.g. a password manager) —
# the secret key is not retrievable from the cluster after creation.
#
# To rotate: delete and recreate the secret, then rollout restart the deployment.

apiVersion: v1
kind: Secret
metadata:
  name: rustfs-credentials
  namespace: biodiversity
type: Opaque
stringData:
  RUSTFS_ACCESS_KEY: "CHANGE_ME"
  RUSTFS_SECRET_KEY: "CHANGE_ME"
